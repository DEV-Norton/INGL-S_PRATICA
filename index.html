<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Trainer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Roboto, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
padding:20px;
}

.container{
width:100%;
max-width:420px;
padding:40px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 60px rgba(0,0,0,0.6);
text-align:center;
}

h1{
margin-bottom:20px;
color:#e2e8f0;
}

.word{
font-size:38px;
margin:25px 0;
font-weight:700;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
outline:none;
background:#020617;
color:white;
border:1px solid rgba(255,255,255,0.1);
text-align:center;
}

.buttons{
margin-top:20px;
display:flex;
flex-direction:column;
gap:10px;
}

button{
padding:13px;
border-radius:10px;
border:none;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:600;
transition:.25s;
}

button:hover{
background:#334155;
transform:translateY(-2px);
}

.result{
margin-top:15px;
font-size:18px;
font-weight:600;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<!-- PAGE 1 -->

<div id="page1">

<h1>English → Past</h1>

<div id="word1" class="word">Click Random Word</div>

<input id="answer1" placeholder="Type the past tense">

<div class="buttons">

<button onclick="randomWord()">🎲 Random Word</button>
<button onclick="checkPast()">✅ Check</button>
<button onclick="showPast()">⏳ Show Past</button>
<button onclick="goPage2()">➡ Portuguese Mode</button>

</div>

<div id="result1" class="result"></div>

</div>


<!-- PAGE 2 -->

<div id="page2" class="hidden">

<h1>Portuguese → English</h1>

<div id="word2" class="word">Clique Random Word</div>

<input id="presentAnswer" placeholder="Present (English)">
<input id="pastAnswer" placeholder="Past (English)">

<div class="buttons">

<button onclick="randomWordPT()">🎲 Random Word</button>
<button onclick="checkBoth()">✅ Check</button>
<button onclick="showAnswers()">📖 Show Answers</button>
<button onclick="goPage1()">⬅ Back</button>

</div>

<div id="result2" class="result"></div>

</div>

</div>


<script>

const words = [

{en:"be", pt:"ser / estar", past:"was / were"},
{en:"have", pt:"ter", past:"had"},
{en:"do", pt:"fazer", past:"did"},
{en:"say", pt:"dizer", past:"said"},
{en:"go", pt:"ir", past:"went"},
{en:"get", pt:"pegar", past:"got"},
{en:"make", pt:"criar", past:"made"},
{en:"know", pt:"saber", past:"knew"},
{en:"think", pt:"pensar", past:"thought"},
{en:"take", pt:"levar", past:"took"},
{en:"see", pt:"ver", past:"saw"}

];

let currentWord=null;

/* PAGE SWITCH */

function goPage2(){

document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");

}

function goPage1(){

document.getElementById("page2").classList.add("hidden");
document.getElementById("page1").classList.remove("hidden");

}


/* PAGE 1 */

function randomWord(){

let index=Math.floor(Math.random()*words.length);

currentWord=words[index];

document.getElementById("word1").innerText=currentWord.en;

document.getElementById("result1").innerText="";
document.getElementById("answer1").value="";

}

function checkPast(){

let answer=document.getElementById("answer1").value.toLowerCase();

if(answer===currentWord.past){

document.getElementById("result1").innerText="✅ Correct";

}else{

document.getElementById("result1").innerText="❌ Correct: "+currentWord.past;

}

}

function showPast(){

document.getElementById("result1").innerText="Past: "+currentWord.past;

}


/* PAGE 2 */

function randomWordPT(){

let index=Math.floor(Math.random()*words.length);

currentWord=words[index];

document.getElementById("word2").innerText=currentWord.pt;

document.getElementById("presentAnswer").value="";
document.getElementById("pastAnswer").value="";
document.getElementById("result2").innerText="";

}

function checkBoth(){

let present=document.getElementById("presentAnswer").value.toLowerCase();
let past=document.getElementById("pastAnswer").value.toLowerCase();

if(present===currentWord.en && past===currentWord.past){

document.getElementById("result2").innerText="✅ Perfect!";

}else{

document.getElementById("result2").innerText="❌ Correct: "+currentWord.en+" / "+currentWord.past;

}

}

function showAnswers(){

document.getElementById("result2").innerText="Answer: "+currentWord.en+" / "+currentWord.past;

}

</script>

</body>
</html>
